# Shape matches BenchMarkTrainConfig in src/dlc_hackathon/schemas/benchmarking.py
# model: PoseModelConfig or DetectorConfig (same fields; task is chosen in code by type)
model:
  type: pose_estimation
  name: example-pose
  net_type: top_down_rtmpose_m
  shuffle: 10
  trainsetindex: 0

dataset:
  name: fish-benchmark
  root: data/fish-dlc-2021-05-07/
  shuffle: 0
  trainsetindex: 0

logger:
  project_name: DLC-Hackathon-2026
  run_name: example-dataset-example-pose-16
  group: null
  tags: null
  notes: null

train_settings:
  batch_size: 16
  epochs: 300
  seed: 42
  dataloader_workers: 12
  dataloader_pin_memory: True
  display_iters: 1000

# Optional; uncomment to override default DeepLabCut config parameters
