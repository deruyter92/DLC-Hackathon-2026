# Shape matches BenchMarkTrainConfig in src/dlc_hackathon/schemas/benchmarking.py
# model: PoseModelConfig or DetectorConfig (same fields; task is chosen in code by type)
model:
  type: detection
  name: example-pose
  net_type: fasterrcnn_mobilenet_v3_large_fpn
  shuffle: 10
  trainsetindex: 0

dataset:
  name: fish-benchmark
  root: data/rc14_bench_fish-dlc-2026-03-10/
  shuffle: 0
  trainsetindex: 0

logger:
  project_name: DLC-Hackathon-2026
  run_name: example-dataset-example-pose-16
  group: null
  tags: null
  notes: null

train_settings:
  batch_size: 16
  epochs: 300
  seed: 42
  dataloader_workers: 12
  dataloader_pin_memory: True
  display_iters: 1000

# Optional; omit or set null to skip custom DLC overrides
overrides:
  data:
    bbox_margin: 25
    colormode: RGB
    inference: null
    train: 
      affine:
        p: 0.5
        scaling: [0.5, 1.25]
        rotation: 60
        translation: 40
      hist_eq: false
      covering: true
      motion_blur: true
  runner:
    optimizer:
      type: AdamW
      params:
        lr: 0.001
        weight_decay: 0.0001
    scheduler: 
      type: SequentialLR
      params:
        milestones: [50]
        schedulers:
          - type: LinearLR
            params:
              end_factor: 1
              total_iters: 5
              start_factor: 0.001
          - type: CosineAnnealingLR
            params:
              T_max: 250
              eta_min: 5.0e-05